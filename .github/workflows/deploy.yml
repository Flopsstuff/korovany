name: Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Job-level env can read the secrets context; step `if` can read env.
    # This lets the deploy step skip cleanly (keeping main green) until the
    # Cloudflare secrets are added, then activate automatically once they are.
    env:
      HAS_CF_CREDS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Binary 3D assets live in Git LFS (see docs/decisions/0001-asset-hosting.md).
          # Without this the build ships LFS pointer files instead of real models.
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Deploy only on main (or manual dispatch) AND only once the Cloudflare
      # secrets exist. PRs run the build above as a CI signal but never deploy.
      - name: Deploy to Cloudflare Pages
        if: ${{ (github.ref == 'refs/heads/main') && (env.HAS_CF_CREDS == 'true') }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=korovany --branch=main

      - name: Deploy skipped (Cloudflare secrets not set)
        if: ${{ (github.ref == 'refs/heads/main') && (env.HAS_CF_CREDS != 'true') }}
        run: |
          echo "::notice::Build OK. Skipping Cloudflare deploy because CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID are not set."
          echo "See docs/operations/cloudflare-deploy.md to provision them, then re-run this workflow."
